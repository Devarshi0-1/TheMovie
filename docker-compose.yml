# Local dev datastores for TheMovie backend.
#   docker compose up -d        # start Postgres (pgvector) + Redis
#   docker compose down         # stop
#   docker compose down -v      # stop + wipe data
#
# Then: cd backend && cp .env.example .env  (fill in the keys), bun install,
#       bun run db:migrate, bun run src/index.ts
services:
  postgres:
    # pgvector image so migration 0002's `CREATE EXTENSION vector` works.
    image: pgvector/pgvector:pg16
    container_name: themovie-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: themovie
    ports:
      - '5432:5432'
    volumes:
      - themovie-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d themovie']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Named to match `bun run dev` (which does `docker start my-movie-redis`).
    container_name: my-movie-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  themovie-pgdata:
