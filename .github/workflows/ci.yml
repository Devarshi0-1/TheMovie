name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Test
        run: bun test

  # Frontend job (vitest + oxlint + tsgo) is added in Phase 7.1, once the
  # `frontend/` package exists. Configure branch protection to require the
  # "Backend — typecheck + test" check so failures block merge.
